# 生产环境配置。启动时需设置 SPRING_PROFILES_ACTIVE=prod
server:
  port: ${SERVER_PORT:9090}

jwt:
  # 生产环境不要在仓库提供默认密钥；请通过环境变量注入 JWT_SECRET
  secret: ${JWT_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:5500,http://localhost:80,http://47.117.80.173,http://127.0.0.1:5501,http://127.0.0.1:5502}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/xinmiao?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: INFO
    com.tree: INFO
    com.tree.mapper: INFO
    org.springdoc: WARN

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
