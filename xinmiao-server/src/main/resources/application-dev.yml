server:
  port: ${SERVER_PORT:9090}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:5500,http://localhost:80,http://47.117.80.173,http://127.0.0.1:5501,http://127.0.0.1:5502}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/xinmiao?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    listener:
      simple:
        # 开发环境可设为 false：跳过 @RabbitListener 连接（避免因本机 5672 上账号不符导致进程退出）。任务发布仍会在首次发 MQ 时连接。
        auto-startup: ${RABBIT_LISTENER_AUTO_STARTUP:true}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: INFO
    com.tree: DEBUG
    # 向量库入库时打印每个切分 chunk 全文（ChromaDataInitializer）
    com.tree.chat.infrastructure.ingest.ChromaDataInitializer: DEBUG
    com.tree.mapper: INFO
    org.springdoc: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
