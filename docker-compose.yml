name: xinmiao

services:
  mysql:
    image: mysql:8.0
    container_name: xinmiao-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xinmiao}
      MYSQL_USER: ${MYSQL_USER:-xinmiao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
    # 宿主机 3306 常被本机 MySQL 占用；默认 3307 与 env/dev.env.example 一致
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 初始化库结构与种子数据（按文件名顺序执行）
      - ./new_sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./new_sql/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks: [xinmiao-net]

  redis:
    image: redis:7-alpine
    container_name: xinmiao-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks: [xinmiao-net]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: xinmiao-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks: [xinmiao-net]

  chroma:
    image: chromadb/chroma:1.0.0
    container_name: xinmiao-chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    # Chroma 1.x 镜像默认持久化在 /data（见官方 cookbook）；挂错路径会导致卷目录始终为空
    volumes:
      - chroma_data:/data
    command: ["run", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks: [xinmiao-net]

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: xinmiao-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    restart: unless-stopped
    networks: [xinmiao-net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: xinmiao-backend:0.0.1-SNAPSHOT
    container_name: xinmiao-backend
    profiles: ["backend"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: "${SERVER_PORT:-9090}"
      # DB
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/xinmiao?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-}
      # Spring AI / OpenAI-compatible
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-}
      # Chroma
      CHROMA_HOST: ${CHROMA_HOST:-http://chroma}
      CHROMA_PORT: "${CHROMA_PORT:-8000}"
      # Zipkin
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      # JWT/CORS（按需覆盖）
      JWT_SECRET: ${JWT_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:5500,http://localhost:80}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chroma:
        condition: service_started
      zipkin:
        condition: service_started
    ports:
      - "${SERVER_PORT:-9090}:9090"
    restart: unless-stopped
    networks: [xinmiao-net]

  # 可选：压测用积分流水批量数据（默认不启用）
  # 启动方式：docker compose --profile seed up -d
  mysql_seed_credit_flow:
    image: mysql:8.0
    container_name: xinmiao-mysql-seed-credit-flow
    profiles: ["seed"]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./new_sql/bulk_seed_credit_flow.sql:/seed.sql:ro
    entrypoint:
      - bash
      - -lc
      - >
        mysql -hmysql -uroot -p$$MYSQL_ROOT_PASSWORD xinmiao < /seed.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
    restart: "no"
    networks: [xinmiao-net]

networks:
  xinmiao-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  chroma_data:
