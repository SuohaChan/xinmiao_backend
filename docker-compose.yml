# 本地依赖（MySQL 由宝塔面板自行安装，不在此编排）
# 本文件启动：Redis、RabbitMQ、Chroma、Zipkin、Prometheus（UI 宿主机 9091）
# 应用 dev：application-dev.yml 中 DB 指向宝塔 MySQL；Redis 默认 localhost:6379（与本文件一致）
#
# 启动：docker compose up -d

services:
  # ---------- MySQL：改用宝塔面板安装，不使用 Docker ----------
  # mysql:
  #   image: mysql:8.0
  #   container_name: xinmiao-mysql
  #   restart: unless-stopped
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: "123456"
  #     MYSQL_DATABASE: xinmiao
  #     TZ: Asia/Shanghai
  #   command:
  #     - --character-set-server=utf8mb4
  #     - --collation-server=utf8mb4_unicode_ci
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 24
  #     start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: xinmiao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  chroma:
    image: chromadb/chroma:1.0.0
    container_name: chroma-db-spring-ai
    restart: unless-stopped
    ports:
      - "8000:8000" # Chroma HTTP API (Spring AI)
    volumes:
      - chroma_data:/chroma/.chroma
    command: ["run", "--host", "0.0.0.0", "--port", "8000"]

  # ---------- Elasticsearch：暂不使用可保持注释 ----------
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
  #   container_name: xinmiao-elasticsearch
  #   restart: unless-stopped
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - ES_JAVA_OPTS=-Xms1g -Xmx1g
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - es_data:/usr/share/elasticsearch/data

  # 分布式追踪 UI + 收集器；应用配置 management.zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans
  # 若后端也跑在同一 compose 网络内，endpoint 可改为 http://zipkin:9411/api/v2/spans
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"

  # 监控：Prometheus 容器内 9090，映射宿主机 9091；配置见 docker/prometheus/prometheus.yml
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: xinmiao-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  # mysql_data:
  redis_data:
  rabbitmq_data:
  chroma_data:
  prometheus_data:
  # es_data:
